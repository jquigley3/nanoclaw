---
# Kaniko Job — builds nanoclaw-agent from GitHub and pushes to local registry.
# Run with: kubectl apply -f deploy/build/kaniko-build.yaml
# Watch:    kubectl logs -f -n nanoclaw job/nanoclaw-build
# Re-run:   kubectl delete job nanoclaw-build -n nanoclaw && kubectl apply -f ...
apiVersion: batch/v1
kind: Job
metadata:
  name: nanoclaw-build
  namespace: nanoclaw
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: beelink
      initContainers:
        # 1. Clone the full repo
        - name: git-clone
          image: alpine/git:latest
          command:
            - git
            - clone
            - --depth=1
            - https://github.com/jquigley3/nanoclaw.git
            - /repo
          volumeMounts:
            - name: repo
              mountPath: /repo
        # 2. Stage just the container/ subdirectory as the build context
        - name: prepare-context
          image: busybox:stable
          command:
            - sh
            - -c
            - cp -r /repo/container/. /buildcontext/
          volumeMounts:
            - name: repo
              mountPath: /repo
            - name: buildcontext
              mountPath: /buildcontext
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - --context=dir:///workspace
            - --dockerfile=/workspace/Dockerfile
            - --destination=192.168.2.11:32500/nanoclaw-agent:latest
            - --insecure  # local registry has no TLS
            - --insecure-pull
            - --cache=false
          volumeMounts:
            - name: buildcontext
              mountPath: /workspace  # kaniko resolves COPY paths from /workspace
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
      volumes:
        - name: repo
          emptyDir: {}
        - name: buildcontext
          emptyDir: {}
