---
# Local OCI registry — stores nanoclaw-agent image inside the cluster.
# Address inside cluster: registry-service.nanoclaw.svc.cluster.local:5000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: nanoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      nodeSelector:
        kubernetes.io/hostname: beelink
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: data
          hostPath:
            path: /var/lib/nanoclaw-registry
            type: DirectoryOrCreate
---
# NodePort so k3s containerd on the host can pull images at 192.168.2.11:5000
apiVersion: v1
kind: Service
metadata:
  name: registry-service
  namespace: nanoclaw
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 32500  # reachable at beelink:32500 from host network
