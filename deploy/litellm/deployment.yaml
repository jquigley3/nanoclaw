---
# Namespace for all nanoclaw k8s resources
apiVersion: v1
kind: Namespace
metadata:
  name: nanoclaw

---
# ConfigMap: LiteLLM routing config
# Ollama runs in the 'ai' namespace as ClusterIP service ollama.ai.svc.cluster.local:11434
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: nanoclaw
data:
  config.yaml: |
    model_list:
      # Haiku → fast/cheap tasks → gemma2:2b (1.6GB, very fast)
      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: ollama/gemma2:2b
          api_base: http://ollama.ai.svc.cluster.local:11434
      - model_name: claude-haiku-4-5
        litellm_params:
          model: ollama/gemma2:2b
          api_base: http://ollama.ai.svc.cluster.local:11434
      # Sonnet → standard tasks → qwen3:8b (5.2GB, good quality)
      - model_name: claude-sonnet-4-5
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://ollama.ai.svc.cluster.local:11434
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://ollama.ai.svc.cluster.local:11434
      # Opus → complex tasks → qwen3:8b (best available)
      - model_name: claude-opus-4-6
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://ollama.ai.svc.cluster.local:11434
      # Catch-all
      - model_name: "*"
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://ollama.ai.svc.cluster.local:11434
    litellm_settings:
      master_key: "sk-local"
      drop_params: true
      request_timeout: 600

---
# LiteLLM proxy — any node is fine, it's just a routing layer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: nanoclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args:
            - --config
            - /etc/litellm/config.yaml
            - --port
            - "4000"
          ports:
            - containerPort: 4000
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: litellm-config

---
# ClusterIP service — agents use http://litellm-service.nanoclaw.svc.cluster.local:4000
apiVersion: v1
kind: Service
metadata:
  name: litellm-service
  namespace: nanoclaw
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
