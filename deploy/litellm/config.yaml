# LiteLLM proxy config — routes Anthropic-format API calls to Ollama in the 'ai' namespace.
# Ollama service: ollama.ai.svc.cluster.local:11434
#
# Available models (as of initial deployment):
#   gemma2:2b       1.6GB  fast, good for haiku-level tasks
#   llama3.2:3b     2.0GB  alternative fast model
#   phi3:3.8b       2.2GB  Microsoft Phi-3
#   mistral:7b      4.4GB  good general purpose
#   deepseek-r1:7b  4.7GB  reasoning-focused
#   qwen3:8b        5.2GB  best quality available → used for sonnet/opus

model_list:
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: ollama/gemma2:2b
      api_base: http://ollama.ai.svc.cluster.local:11434

  - model_name: claude-haiku-4-5
    litellm_params:
      model: ollama/gemma2:2b
      api_base: http://ollama.ai.svc.cluster.local:11434

  - model_name: claude-sonnet-4-5
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://ollama.ai.svc.cluster.local:11434

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://ollama.ai.svc.cluster.local:11434

  - model_name: claude-opus-4-6
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://ollama.ai.svc.cluster.local:11434

  - model_name: "*"
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://ollama.ai.svc.cluster.local:11434

litellm_settings:
  master_key: "sk-local"
  drop_params: true
  request_timeout: 600
