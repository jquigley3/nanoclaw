# LiteLLM proxy config — routes Anthropic-format API calls to local Ollama.
# Deploy with: kubectl apply -f deploy/litellm/
#
# Model mapping strategy:
#   claude-haiku-*   → fast/cheap tasks  → llama3.2:3b  (quick, low RAM)
#   claude-sonnet-*  → standard tasks    → qwen2.5:14b  (quality/speed balance)
#   claude-opus-*    → complex tasks     → qwen2.5:32b  (best quality, needs RAM)
#
# Adjust model names to whatever is pulled in your Ollama instance.
# Check available models: ssh intel-nuc ollama list

model_list:
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama-service:11434

  - model_name: claude-haiku-4-5
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama-service:11434

  - model_name: claude-sonnet-4-5
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://ollama-service:11434

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://ollama-service:11434

  - model_name: claude-opus-4-6
    litellm_params:
      model: ollama/qwen2.5:32b
      api_base: http://ollama-service:11434

  # Catch-all: any unknown claude-* model falls back to the standard mapping
  - model_name: "*"
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://ollama-service:11434

litellm_settings:
  # Accept any API key — containers send LITELLM_API_KEY (sk-local by default)
  master_key: "sk-local"
  # Drop unknown params that the Anthropic SDK sends but Ollama doesn't understand
  drop_params: true
  # Increase timeout for large model inference
  request_timeout: 600
